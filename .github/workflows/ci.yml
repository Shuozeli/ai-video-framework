name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build all packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Build in topological order — every downstream package consumes
      # `@ai-video/dsl` (and templates') via `link:`, which resolves to
      # the linked package's dist/ at type-check time. So dsl must
      # compile before anything that imports it; templates before
      # renderer + server.
      - name: Build @ai-video/dsl
        working-directory: packages/ai-video-dsl
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Build @ai-video/templates
        working-directory: packages/ai-video-templates
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Build @ai-video/cli
        working-directory: packages/ai-video-cli
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Type-check @ai-video/renderer
        working-directory: packages/ai-video-renderer
        # Renderer's build script is `tsc --noEmit` (Remotion runs from src).
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Build @ai-video/server
        working-directory: src/server
        run: pnpm install --frozen-lockfile && pnpm build
