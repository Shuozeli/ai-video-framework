name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  packages:
    name: Packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Build order matters: dsl is a peer of all others via link: deps,
        # but each install resolves its own link, so order is for diagnostic
        # clarity, not correctness.
        package:
          - packages/ai-video-dsl
          - packages/ai-video-templates
          - packages/ai-video-renderer
          - packages/ai-video-cli
          - src/server
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ matrix.package }}/pnpm-lock.yaml

      - name: Install
        working-directory: ${{ matrix.package }}
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: ${{ matrix.package }}
        # Each package's `build` script is `tsc` (templates/cli/dsl/server)
        # or `tsc --noEmit` (renderer). Both cover the type-check.
        run: pnpm build
